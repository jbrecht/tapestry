<div #mapContainer class="map-container"></div>

@if (store.mapNodes().length > 0) {
  <button class="fit-all-btn" (click)="fitAll()" title="Fit all places">
    <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
      <path fill-rule="evenodd" d="M1 4.75C1 3.784 1.784 3 2.75 3h14.5c.966 0 1.75.784 1.75 1.75v10.515a1.75 1.75 0 01-1.75 1.75h-14.5A1.75 1.75 0 011 15.265V4.75zm1.5 0v10.515c0 .138.112.25.25.25h14.5a.25.25 0 00.25-.25V4.75a.25.25 0 00-.25-.25H2.75a.25.25 0 00-.25.25z" clip-rule="evenodd" />
      <path d="M4.5 7.5a.5.5 0 01.5-.5h10a.5.5 0 010 1H5a.5.5 0 01-.5-.5zm0 2.5a.5.5 0 01.5-.5h10a.5.5 0 010 1H5a.5.5 0 01-.5-.5zm0 2.5a.5.5 0 01.5-.5h6a.5.5 0 010 1H5a.5.5 0 01-.5-.5z" />
    </svg>
    Fit all
  </button>
}

@if (store.mapNodes().length === 0) {
  <div class="empty-state">
    <p>No places with coordinates yet.</p>
    <p class="hint">Ask the AI about places — it will extract their geographic coordinates automatically.</p>
  </div>
}
