<header class="top-bar">
  <div class="left-section">
    <app-project />
    <app-perspective-switcher />
  </div>
  <div class="middle-section">
    <div class="filter-bar" [class.active]="!!store.filterText()">
      <svg class="filter-icon" viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" />
      </svg>
      <input
        class="filter-input"
        type="text"
        [value]="store.filterText()"
        (input)="store.setFilterText(filterInput.value)"
        placeholder="Filter nodes…"
        #filterInput
      />
      @if (store.filterText()) {
        <button class="filter-clear" (click)="store.setFilterText(''); filterInput.value = ''" aria-label="Clear filter">✕</button>
      }
    </div>
  </div>
  <div class="right-section">
    <app-tapestry-stats />
    <app-user-menu />
  </div>
</header>
<mat-drawer-container class="tapestry-container">
  <mat-drawer mode="side" opened class="chat-drawer">
    <app-chat />
  </mat-drawer>
  <mat-drawer-content class="main-content">
    @if (store.activePerspective() === 'abstract') {
      <app-tapestry-canvas />
    } @else if (store.activePerspective() === 'timeline') {
      <app-tapestry-timeline />
    } @else {
      <div style="display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; color: #666;">
        <h2>The {{ store.activePerspective() }} view is under construction.</h2>
      </div>
    }
    <app-node-detail-panel />
  </mat-drawer-content>
</mat-drawer-container>
